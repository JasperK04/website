- name: "Bachelor Thesis"
  display_name: "PACEcoding: Efficiency-Oriented Prompting in Multi-Agent LLM Code Generation"
  Course: "Bachelor Thesis"
  description: "Bachelor thesis on improving the efficiency of multi-agent LLM code generation."
  featured: true
  featured_priority: 1
  thesis: true
  problem: "Evaluate whether efficiency-oriented prompting and multi-agent workflows improve code-generation pass rates under execution constraints."
  implementation: "The experiment runner configures a dataset, prompting strategy, model, temperature, pass-at-k value, and execution limit; it supports Direct, MapCoder, and PACEcoding strategies and writes each run to a JSONL results path."
