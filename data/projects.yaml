- name: "KTP"
  display_name: "Fastener Recommendation System"
  Course: "Knowledge Technology Practical"
  description: "The Fastener Recommendation System is a web application designed to assist users in selecting the appropriate fasteners for their projects. It provides recommendations based on user input, such as material type, load requirements, and environmental conditions. The system utilizes an expert knowledge base of fasteners and their properties to generate suggestions. The system has three main models; A Domain Model, A Rule Model and A Problem Solving Model. The system required a user interface for which we used Flask."
